# ---- 按需修改以下两项 ----
# 如果你有域名，填域名；没有的话填服务器 IP
server_name  sbti.example.com;

server {
    listen 80;
    server_name  sbti.example.com;   # ← 和上面保持一致

    root  /var/www/sbti-quiz;
    index index.html;

    # 单页应用，所有路径都回到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（目前只有一个 HTML，未来加 JS/CSS/图片时自动生效）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    access_log /var/log/nginx/sbti-quiz.access.log;
    error_log  /var/log/nginx/sbti-quiz.error.log;
}
