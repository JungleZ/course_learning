<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 恋爱观与情商小贴士</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- 主容器 -->
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center position-relative">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                
                <!-- 主卡片 -->
                <div class="card quote-card shadow-lg border-0 animate-fade-in">
                    <!-- 卡片头部 -->
                    <div class="card-header text-center border-0 bg-gradient-primary py-4">
                        <div class="mb-3">
                            <i class="bi bi-heart-fill text-white display-4 pulse-animation"></i>
                        </div>
                        <h1 class="card-title text-white mb-0 fw-bold">
                            <i class="bi bi-stars me-2"></i>恋爱观与情商小贴士<i class="bi bi-stars ms-2"></i>
                        </h1>
                        <p class="text-white-50 mt-2 mb-0 small">
                            <i class="bi bi-lightbulb me-1"></i>每日智慧 · 情感成长
                        </p>
                    </div>

                    <!-- 卡片主体 -->
                    <div class="card-body p-5">
                        <!-- 分类标签 -->
                        <div class="text-center mb-3">
                            <span id="quote-category" class="badge bg-primary rounded-pill px-3 py-2">
                                <i class="bi bi-tag me-1"></i>加载中...
                            </span>
                        </div>

                        <!-- 语录显示区域 -->
                        <div id="quote-container" class="quote-wrapper mb-4">
                            <div class="quote-icon mb-3">
                                <i class="bi bi-quote display-1 text-primary opacity-25"></i>
                            </div>
                            <div id="quote-box" class="quote-content">
                                <p id="quote-text" class="lead mb-0 fw-medium">
                                    <span class="spinner-border spinner-border-sm me-2" role="status"></i>
                                    正在加载智慧语录...
                                </p>
                            </div>
                            <div class="quote-icon mt-3 text-end">
                                <i class="bi bi-quote display-1 text-primary opacity-25" style="transform: rotate(180deg);"></i>
                            </div>
                        </div>

                        <!-- 分隔线 -->
                        <hr class="my-4 opacity-25">

                        <!-- 统计信息 -->
                        <div class="text-center mb-3">
                            <small class="text-muted">
                                <i class="bi bi-collection me-1"></i>
                                语录库共 <span id="total-quotes" class="fw-bold text-primary">60+</span> 条智慧提示
                            </small>
                        </div>

                        <!-- 控制按钮区域 -->
                        <div class="d-flex justify-content-between align-items-center">
                            <!-- 刷新按钮 -->
                            <button id="refresh-btn" class="btn btn-outline-primary rounded-pill px-4 py-2 transition-all">
                                <i class="bi bi-arrow-clockwise me-2"></i>换一条
                            </button>

                            <!-- 自动刷新开关 -->
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="auto-refresh" checked>
                                <label class="form-check-label small text-muted" for="auto-refresh">
                                    <i class="bi bi-play-circle me-1"></i>自动刷新
                                </label>
                            </div>
                        </div>

                        <!-- 计时器显示 -->
                        <div class="text-center mt-3">
                            <small class="text-muted">
                                <i class="bi bi-hourglass-split me-1"></i>
                                下次更新: <span id="countdown" class="fw-bold text-primary">5</span> 秒
                            </small>
                        </div>
                    </div>

                    <!-- 卡片底部 -->
                    <div class="card-footer bg-light border-0 py-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">
                                <i class="bi bi-info-circle me-1"></i>
                                提升情商，建立健康关系
                            </small>
                            <div class="social-links">
                                <a href="{{ url_for('bus_chat') }}" class="text-decoration-none me-2" title="等公交聊天室">
                                    <i class="bi bi-bus-front text-success"></i>
                                </a>
                                <a href="#" class="text-decoration-none me-2" title="分享">
                                    <i class="bi bi-share text-primary"></i>
                                </a>
                                <a href="#" class="text-decoration-none me-2" title="收藏">
                                    <i class="bi bi-bookmark text-warning"></i>
                                </a>
                                <a href="#" class="text-decoration-none" title="喜欢">
                                    <i class="bi bi-heart text-danger"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 提示卡片 -->
                <div class="alert alert-info mt-4 border-0 shadow-sm animate-slide-up" role="alert">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-lightbulb-fill text-warning fs-4 me-3"></i>
                        <div>
                            <strong>温馨提示：</strong>
                            <span class="d-block small mt-1">涵盖恋爱观、沟通技巧、相处之道、异地恋、婚姻家庭、分手疗愈等85+条实用建议 💭</span>
                        </div>
                    </div>
                </div>

                <!-- 等公交聊天室入口 -->
                <div class="card mt-4 border-0 shadow-lg animate-slide-up" style="animation-delay: 0.4s;">
                    <div class="card-body p-4">
                        <div class="row align-items-center">
                            <div class="col-md-2 text-center mb-3 mb-md-0">
                                <div class="display-1">🚌</div>
                            </div>
                            <div class="col-md-7">
                                <h4 class="mb-2">
                                    <i class="bi bi-chat-heart-fill text-danger me-2"></i>
                                    等公交互动聊天室
                                </h4>
                                <p class="text-muted mb-2">
                                    在公交车上遇见缘分，等待中也能温暖相遇
                                </p>
                                <ul class="list-unstyled small text-muted mb-0">
                                    <li><i class="bi bi-check-circle-fill text-success me-1"></i>实时在线聊天</li>
                                    <li><i class="bi bi-check-circle-fill text-success me-1"></i>聊天满5分钟可加好友</li>
                                    <li><i class="bi bi-check-circle-fill text-success me-1"></i>公交车每2分钟一班</li>
                                </ul>
                            </div>
                            <div class="col-md-3 text-center">
                                <a href="{{ url_for('bus_chat') }}" class="btn btn-success btn-lg rounded-pill w-100">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>
                                    进入聊天室
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自定义JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
