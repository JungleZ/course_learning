<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISC领导力测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container py-4">
        <div class="row">
            <div class="col-md-10 mx-auto">
                <div class="text-center mb-5">
                    <h1 class="display-4">DISC领导力测试</h1>
                    <p class="lead">了解您的领导风格特点，发挥优势，持续改进</p>
                </div>
                
                <form id="testForm">
                    <div class="mb-4">
                        <h3>请根据您的实际情况，选择最符合的选项（1-5分，1=完全不符合，5=完全符合）</h3>
                    </div>
                    
                    <div id="questionsContainer"></div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg mt-4">提交测试</button>
                    </div>
                </form>
                
                <div id="loadingSpinner" class="text-center my-4" style="display:none;">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                    <p class="mt-2">正在分析您的结果...</p>
                </div>
                
                <div id="resultSection" class="result-section">
                    <h2 class="text-center mb-4">您的DISC领导力分析结果</h2>
                    <div class="row">
                        <div class="col-md-8">
                            <div class="card">
                                <div class="card-header">
                                    <h4 id="styleType"></h4>
                                </div>
                                <div class="card-body">
                                    <p id="styleDescription" class="lead"></p>
                                    <h5>您的主要优势：</h5>
                                    <ul id="strengthsList"></ul>
                                    <h5>可发展的领域：</h5>
                                    <ul id="developmentAreasList"></ul>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">
                                    <h4>得分详情</h4>
                                </div>
                                <div class="card-body">
                                    <div id="scoreDetails"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chart-container mt-4">
                        <div class="bar-container">
                            <div class="bar" id="bar-d">
                                <div class="bar-value" id="value-d">0</div>
                                <div class="bar-label">D (支配)</div>
                            </div>
                            <div class="bar" id="bar-i">
                                <div class="bar-value" id="value-i">0</div>
                                <div class="bar-label">I (影响)</div>
                            </div>
                            <div class="bar" id="bar-s">
                                <div class="bar-value" id="value-s">0</div>
                                <div class="bar-label">S (稳健)</div>
                            </div>
                            <div class="bar" id="bar-c">
                                <div class="bar-value" id="value-c">0</div>
                                <div class="bar-label">C (谨慎)</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
