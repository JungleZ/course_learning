{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>编辑会议信息</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit_meeting', meeting_db_id=meeting.id) }}">
                    <div class="mb-3">
                        <label class="form-label">会议编号 <span class="text-muted">(不可修改)</span></label>
                        <input type="text" class="form-control" value="{{ meeting.meeting_id }}" readonly>
                    </div>
                    
                    <div class="mb-3">
                        <label for="theme" class="form-label">会议主题 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="theme" name="theme" required value="{{ meeting.theme }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="time" class="form-label">会议时间 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="time" name="time" required value="{{ meeting.time }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">会议地址/线上链接</label>
                        <input type="text" class="form-control" id="address" name="address" value="{{ meeting.address or '' }}">
                    </div>
                    
                    <div class="mb-4">
                        <label for="fee_info" class="form-label">费用说明</label>
                        <textarea class="form-control" id="fee_info" name="fee_info" rows="3">{{ meeting.fee_info or '' }}</textarea>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('meeting_detail', meeting_db_id=meeting.id) }}" class="btn btn-secondary me-md-2">
                            <i class="bi bi-arrow-left me-1"></i>返回详情
                        </a>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-lg me-1"></i>保存修改
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted">
                <small>注意：会议编号创建后不可修改</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
