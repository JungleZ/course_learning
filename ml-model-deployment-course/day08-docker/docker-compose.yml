# Docker Compose 多服务编排
# 用法：docker-compose up -d

version: '3.8'

services:
  # ML 模型 API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iris-api
    ports:
      - "5000:5000"
    environment:
      - MODEL_PATH=/app/iris_model.pkl
    volumes:
      - ./models:/app/models  # 持久化模型文件
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理（生产环境推荐）
  nginx:
    image: nginx:alpine
    container_name: iris-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
